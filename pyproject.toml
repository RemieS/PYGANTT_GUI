[build-system]
requires = ["setuptools>=80", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pygantt"
version = "0.1.0"
description = "A retro Gantt chart tool built with Textual"
readme = "README.md"
requires-python = ">=3.9"
authors = [
  { name = "Remie Stronks" }
]
license = { text = "MIT" }
dependencies = [
  "textual>=0.60"
]

[project.scripts]
pyganttgui = "pygantt.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
pygantt = ["assets/*"]
